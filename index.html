<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Syntrix AI</title><style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:40px;
}

input{
padding:12px;
width:250px;
font-size:16px;
}

button{
padding:12px 20px;
background:#22c55e;
border:none;
font-size:16px;
color:white;
cursor:pointer;
}

#chatbox{
margin-top:30px;
font-size:18px;
color:#38bdf8;
}
</style></head><body><h1>🤖 Syntrix AI</h1><input id="question" placeholder="कुछ पूछो...">
<button onclick="askAI()">भेजें</button><div id="chatbox"></div><script>

async function askAI(){

let question=document.getElementById("question").value;

document.getElementById("chatbox").innerHTML="AI सोच रहा है...";

let response = await fetch("https://api.openai.com/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer YOUR_API_KEY"
},

body:JSON.stringify({

model:"gpt-3.5-turbo",

messages:[
{role:"user",content:question}
]

})

});

let data = await response.json();

document.getElementById("chatbox").innerHTML =
data.choices[0].message.content;

}

</script></body>
</html>
