<!DOCTYPE html>
<html>
<head>
<title>Syntrix AI</title>
<style>
body{
font-family: Arial;
text-align:center;
background:#111;
color:white;
}

.container{
margin-top:50px;
}

input{
padding:10px;
width:200px;
}

button{
padding:10px 20px;
background:#00ffcc;
border:none;
font-size:16px;
}

#reply{
margin-top:20px;
color:#00ffcc;
font-size:18px;
}
</style>
</head>

<body>

<h1>🤖 Syntrix AI</h1>

<div class="container">

<input type="text" id="userInput" placeholder="कुछ पूछें">
<button onclick="askAI()">भेजें</button>

<div id="reply"></div>

</div>

<script>

function askAI(){

let input=document.getElementById("userInput").value.toLowerCase();
let reply="";

if(input.includes("hello") || input.includes("hi")){
reply="नमस्ते 👋 मैं Syntrix AI हूँ";
}
else if(input.includes("ipl")){
reply="IPL भारत की सबसे बड़ी क्रिकेट लीग है 🏏";
}
else if(input.includes("time")){
reply="अभी का समय: "+ new Date().toLocaleTimeString();
}
else{
reply="माफ़ करें, मैं अभी सीख रहा हूँ 🤖";
}

document.getElementById("reply").innerHTML=reply;

}

</script>

</body>
</html>
