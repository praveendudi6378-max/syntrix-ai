
<!DOCTYPE html>
<html>
<head>
<title>Syntrix AI Dashboard</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
}

.header{
background:#111;
padding:20px;
font-size:28px;
}

.menu button{
padding:12px 25px;
margin:10px;
font-size:18px;
border:none;
border-radius:6px;
background:#00ffd5;
}

.box{
margin:20px auto;
width:80%;
background:#1e1e1e;
padding:20px;
border-radius:10px;
}

input{
padding:10px;
width:70%;
}

</style>

</head>

<body>

<div class="header">
🤖 Syntrix AI Dashboard
</div>

<div class="menu">

<button onclick="chat()">AI Chat</button>

<button onclick="predict()">Prediction Tool</button>

<button onclick="auto()">Automation</button>

</div>

<div class="box" id="panel">

<p>Welcome to Syntrix AI System</p>

</div>

<script>

function chat(){

document.getElementById("panel").innerHTML =
`
<h2>AI Chat</h2>

<input id="msg" placeholder="Ask AI something">

<button onclick="send()">Send</button>

<div id="chatlog"></div>
`;

}

async function send(){

let text = document.getElementById("msg").value;

document.getElementById("chatlog").innerHTML +=
"<p>🧑‍💻 You: "+text+"</p>";

let response = await fetch("https://api.affiliateplus.xyz/api/chatbot?message="+text+"&botname=SyntrixAI&ownername=Praveen");

let data = await response.json();

document.getElementById("chatlog").innerHTML +=
"<p>🤖 AI: "+data.message+"</p>";

}

function predict(){

document.getElementById("panel").innerHTML =
"<h2>Prediction Tool</h2><p>Prediction system loading...</p>";

}

function auto(){

document.getElementById("panel").innerHTML =
"<h2>Automation Tools</h2><p>Automation system ready</p>";

}

</script>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
<title>Syntrix AI</title>

<style>
body{
font-family: Arial;
background:#0f0f0f;
color:white;
text-align:center;
margin:0;
}

header{
background:#1f1f1f;
padding:20px;
font-size:30px;
}

.container{
margin-top:40px;
}

button{
padding:15px 25px;
margin:10px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
background:#00c3ff;
color:black;
}

button:hover{
background:#00ff9d;
}

.chatbox{
margin-top:30px;
}

input{
padding:10px;
width:250px;
font-size:16px;
}

#output{
margin-top:20px;
font-size:18px;
color:#00ff9d;
}
</style>
</head>

<body>

<header>
🤖 Syntrix AI
</header>

<div class="container">

<h2>AI Tools</h2>

<button onclick="prediction()">📊 Prediction Tool</button>
<button onclick="automation()">⚙ Automation Tool</button>

<div class="chatbox">
<h2>AI Chat</h2>

<input type="text" id="userInput" placeholder="Type message...">
<button onclick="chat()">Send</button>

<div id="output"></div>

</div>

</div>

<script>

function prediction(){
document.getElementById("output").innerHTML =
"Prediction system coming soon...";
}

function automation(){
document.getElementById("output").innerHTML =
"Automation tools loading...";
}

function chat(){

let text = document.getElementById("userInput").value;

if(text=="hello"){
document.getElementById("output").innerHTML="Hello 👋";
}
else if(text=="ai"){
document.getElementById("output").innerHTML="Syntrix AI Active";
}
else{
document.getElementById("output").innerHTML="AI is thinking...";
}

}

</script>

</body>
</html>
